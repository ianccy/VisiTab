<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — TabZ</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo"><img src="icons/icon48.png" alt="logo" class="logo-icon">TabZ</h1>
      </div>
      <div class="topbar-center">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="搜尋所有 tabs..." autocomplete="off">
          <button id="search-clear" class="search-clear" hidden>✕</button>
        </div>
      </div>
      <div class="topbar-right">
        <!-- Auth & Sync Status -->
        <div id="sync-status" class="sync-status" hidden>
          <span id="sync-indicator" class="sync-indicator"></span>
          <span id="sync-text" class="sync-text"></span>
        </div>
        <div id="auth-area" class="auth-area">
          <button id="btn-sign-in" class="sign-in-btn" hidden>登入 Google</button>
          <div id="user-menu-trigger" class="user-menu-trigger" hidden>
            <img id="user-avatar" class="user-avatar" src="" alt="">
          </div>
        </div>
        <div id="user-dropdown" class="user-dropdown" hidden>
          <div id="user-email" class="user-dropdown-email"></div>
          <div id="user-sync-info" class="user-dropdown-sync"></div>
          <button id="btn-switch-account" class="user-dropdown-item">切換帳號</button>
          <button id="btn-sign-out" class="user-dropdown-item danger">登出</button>
        </div>

        <button id="btn-theme-toggle" class="theme-toggle" title="切換深色/淺色模式">
          <span class="theme-toggle-icon moon">🌙</span>
          <span class="theme-toggle-icon sun">☀️</span>
        </button>
        <div class="settings-wrapper">
          <button id="btn-settings" class="icon-btn settings-trigger" title="設定">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div id="settings-dropdown" class="settings-dropdown" hidden>
            <div class="settings-dropdown-item">
              <label class="settings-label" id="settings-lang-label">語言</label>
              <select id="lang-select" class="lang-select"></select>
            </div>
            <div class="settings-dropdown-item">
              <button id="btn-bg-settings" class="settings-btn"><span id="settings-bg-label">背景設定</span></button>
            </div>
            <div class="settings-dropdown-item">
              <button id="btn-import" class="settings-btn"><span id="settings-import-label">匯入</span></button>
            </div>
            <div class="settings-dropdown-item">
              <button id="btn-export" class="settings-btn"><span id="settings-export-label">匯出</span></button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Collections -->
      <main class="collections-area">
        <div id="collections-list" class="collections-grid"></div>
        <div class="collections-actions">
          <button id="btn-add-collection" class="add-collection-btn">+ 新增 Collection</button>
          <button id="btn-link-folder" class="add-collection-btn link-folder-btn">🔗 連結書籤資料夾</button>
        </div>
      </main>

      <!-- Right: Open Tabs Sidebar -->
      <aside class="open-tabs-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-label">開啟中的 Tabs</span>
          <span id="open-tabs-count" class="sidebar-count">0</span>
        </div>
        <div id="open-tabs-list" class="open-tabs-list"></div>
      </aside>
    </div>
  </div>
  <!-- Background Settings Panel -->
  <div id="bg-settings-panel" class="bg-settings-panel" hidden>
    <div class="bg-settings-header">
      <span id="bg-settings-title" class="bg-settings-title">背景設定</span>
      <button id="bg-settings-close" class="bg-settings-close">✕</button>
    </div>
    <div class="bg-settings-section">
      <label id="bg-color-label" class="bg-settings-label">背景顏色</label>
      <div class="bg-color-options">
        <input type="color" id="bg-color-input" class="bg-color-input" value="#f5f5f9">
        <button id="bg-reset-btn" class="modal-btn secondary bg-reset-btn">重置背景</button>
      </div>
    </div>
    <div class="bg-settings-section">
      <label id="bg-image-label" class="bg-settings-label">背景圖片</label>
      <div id="bg-image-current" class="bg-image-current" hidden>
        <img id="bg-image-thumb" class="bg-image-thumb" src="" alt="">
        <span id="bg-image-name" class="bg-image-name"></span>
        <button id="bg-remove-image-btn" class="bg-remove-btn" title="移除圖片">✕</button>
      </div>
      <div class="bg-image-url-row">
        <input type="text" id="bg-image-url-input" class="bg-image-url-input" placeholder="https://example.com/image.jpg">
        <button id="bg-image-url-apply" class="modal-btn primary">套用</button>
      </div>
    </div>
  </div>
  <div id="dropdown-overlay" class="dropdown-overlay" hidden></div>
  <input type="file" id="import-file-input" accept=".json" hidden>
  <script type="module" src="js/app.js"></script>
</body>
</html>
